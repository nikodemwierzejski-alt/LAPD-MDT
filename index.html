<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT - LSPD Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- EKRAN LOGOWANIA -->
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>LSPD MDT - AUTORYZACJA</h2>
            <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">(Test: Odznaka 99, Hasło: lspd)</p>
            <input type="text" id="badgeInput" placeholder="Numer Odznaki">
            <input type="password" id="passwordInput" placeholder="Hasło systemowe">
            <button onclick="zaloguj()">Zaloguj do systemu</button>
            <div id="login-error" style="color: red; margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <!-- GŁÓWNY PANEL SYSTEMU (ukryty na start) -->
    <div id="main-system" class="mdt-container" style="display: none;">
        <header>
            <h1>MOBILE DATA TERMINAL</h1>
            <div style="text-align: right;">
                <div id="system-status">Status: Łączenie...</div>
                <div id="officer-name" style="font-size: 13px; color: #38bdf8; margin-top: 4px;"></div>
            </div>
        </header>

        <main>
            <!-- Wyszukiwarka i wyniki -->
            <section class="card">
                <h2>Wyszukiwarka Obywateli</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Wpisz imię lub nazwisko...">
                    <button onclick="szukajObywatela()">Szukaj</button>
                </div>
                <div id="wynikiWyszukiwania" class="results-list"></div>
            </section>

            <!-- Kartoteka (Dodawanie) -->
            <section class="card">
                <h2>Dodaj do Kartoteki</h2>
                <form id="dodajObywatelaForm" onsubmit="dodajObywatela(event)">
                    <input type="text" id="formImie" placeholder="Imię" required>
                    <input type="text" id="formNazwisko" placeholder="Nazwisko" required>
                    <input type="text" id="formDataUrodzenia" placeholder="Data urodzenia (np. 01/01/1990)">
                    <textarea id="formUwagi" placeholder="Uwagi kryminalne..."></textarea>
                    <button type="submit">Zapisz w bazie</button>
                </form>
            </section>
            <!-- Panel Administratora (widoczny tylko dla roli admin) -->
            <section class="card" id="admin-panel" style="display: none; grid-column: span 2; margin-top: 20px; border-color: #eab308;">
                <h2 style="color: #eab308;">Zarządzanie Kadrami LSPD</h2>
                <form id="dodajFunkcjonariuszaForm" onsubmit="dodajFunkcjonariusza(event)" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <input type="text" id="activeBadge" placeholder="Nowa Odznaka (np. 002S)" required style="margin-bottom: 0; flex: 1; background: #1e293b; color: #fff; border: 1px solid #334155; padding: 8px;">
                    <input type="text" id="activeName" placeholder="Stopień i Nazwisko" required style="margin-bottom: 0; flex: 2; background: #1e293b; color: #fff; border: 1px solid #334155; padding: 8px;">
                    <input type="password" id="activePassword" placeholder="Hasło" required style="margin-bottom: 0; flex: 1; background: #1e293b; color: #fff; border: 1px solid #334155; padding: 8px;">
                    <button type="submit" style="background-color: #eab308; color: #0f172a; padding: 10px 20px; font-weight: bold; border: none; cursor: pointer;">Dodaj Kadra</button>
                </form>
                <div id="admin-message" style="margin-top: 10px; font-size: 14px; font-weight: bold;"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
